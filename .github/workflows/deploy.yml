name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 监听 main 分支的变化，推送代码到 main 时触发部署

jobs:
  deploy:
    runs-on: ubuntu-latest  # 在最新的 Ubuntu 上运行部署

    steps:
      - name: Check out the repository
        uses: actions/checkout@v3  # 获取代码

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'  # 设置 Node.js 版本（根据需要修改）

      - name: Build the project
        run: |
          npm run build  # 执行构建命令

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.3.1  # 使用 GitHub Pages 部署 action
        with:
          branch: gh-pages  # 部署到 gh-pages 分支
          folder: build     # 你的构建文件夹（例如 React 的构建文件夹是 build）

